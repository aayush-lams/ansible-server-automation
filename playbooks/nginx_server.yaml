---
- name: User Management and System Foundation
  hosts: linux
  become: yes #sudo access
  gather_facts: yes #initial recon for better intelligence, res alloc

  vars:
    admin_user: asur
    report_dir: "/home/{{ admin_user }}"
    report_file: "system_report.txt"
    site_dir: "/var/www"

  tasks:
    - name: define default firewalls rules
      ufw:
        policy: "{{ item.policy }}"
        direction: "{{ item.direction }}"
      loop:
        - {policy: 'deny', direction: 'incoming'}
        - {policy: 'allow', direction: 'outgoing'}

    - name: control listening ports
      ufw:
        rule: allow
        port: '{{ item }}'
        proto: tcp
      loop:
        - '2222'
        - '80'
        - '443'

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Get UFW status
      command: ufw status verbose
      register: ufw_status
    
    - name: ensure home directory
      file:
        path: "/home/{{ admin_user }}"
        state: directory
        mode: '0755'
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
    
    - name: Save firewall rules to file
      copy:
        content: |
          UFW Firewall Configuration
          ==========================
          Generated: {{ ansible_date_time.date }} {{ ansible_date_time.time }}
          Host: {{ ansible_hostname }}
          
          {{ ufw_status.stdout }}
        dest: "/home/{{ admin_user }}/firewall_rules.txt"
        mode: '0644'
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
    
    - name: Verify file was created
      stat:
        path: "/home/{{ admin_user }}/firewall_rules.txt"
      register: file_info
    
    - name: Show file location
      debug:
        msg: "Firewall rules saved to: /home/{{ admin_user }}/firewall_rules.txt ({{ file_info.stat.size }} bytes)"

    - name: ensure dig, ping, curl nslookup
      apt:
        name:
          - dnsutils
          - iputils-ping
          - curl
        state: present
        update_cache: yes

